name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api:
    name: API — lint, types, tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/requirements-dev.txt
      - run: pip install -r requirements-dev.txt
      - name: Ruff
        run: ruff check .
      - name: Mypy
        run: mypy app
      - name: Pytest
        # Deterministic, network-free suite (offline evidence + synthesis).
        env:
          EVIDENCE_MODE: offline
          LLM_MODE: offline
        run: pytest -q

  web:
    name: Web — lint, types, build, e2e
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Build
        run: npm run build
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      - name: E2E (frontend specs; live flow is opt-in)
        run: npm run test:e2e
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report
          retention-days: 7

  docker:
    name: Docker images build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: ./apps/api
          push: false
          tags: evidencecompare-api:ci
      - name: Build web image
        uses: docker/build-push-action@v6
        with:
          context: ./apps/web
          push: false
          tags: evidencecompare-web:ci
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=http://localhost:8000/api/v1
